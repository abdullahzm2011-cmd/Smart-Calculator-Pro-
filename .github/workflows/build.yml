name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build APK
        uses: Digreatbrian/buildozer-action@v2
        with:
          buildozer_version: stable

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
